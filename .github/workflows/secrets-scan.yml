# API keys, sensitive data, credentials
# GitLeaks

name: Secrets Scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest

        steps:

            - name: Checkout Code
              uses: actions/checlkout@v4
              with:
                fetch-depth: 0  # Checks old commit also even if the code has been removed or modified

            - name: Run GitLeaks Scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}} #generated by github when the actions run(not generated by you)


              
