<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Pipeline Dashboard</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e2e8f0;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 700px;
        }

        h1 {
            font-size: 2.7rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .badge {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 0.4rem 1.2rem;
            border: 1px solid #6366f1;
            border-radius: 999px;
            font-size: 0.8rem;
            color: #c7d2fe;
            letter-spacing: 0.05em;
        }

        .cards {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1.5rem;
            min-width: 160px;
            flex: 1;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
        }

        .card span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }

        .card strong {
            font-size: 1.2rem;
            color: #f8fafc;
        }

        .status {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #22c55e;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>CI/CD Pipeline Dashboard 🚀</h1>
        <p class="subtitle">Automated deployment using GitHub Actions & Docker</p>

        <div class="badge">Production Ready • DevOps Project</div>

        <div class="cards">
            <div class="card">
                <span>Framework</span>
                <strong>Flask</strong>
            </div>

            <div class="card">
                <span>CI/CD</span>
                <strong>GitHub Actions</strong>
            </div>

            <div class="card">
                <span>Container</span>
                <strong>Docker</strong>
            </div>

            <div class="card">
                <span>Deployment</span>
                <strong>AWS / Cloud</strong>
            </div>
        </div>

        <div class="status">
            ✅ Latest Build: Successful
        </div>

        <div class="footer">
            Built with ❤️ for DevOps Automation
        </div>
    </div>
</body>
</html>
